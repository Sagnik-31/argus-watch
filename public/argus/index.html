<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARGUS — AI Proctoring System</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>

  <!-- ── Landing Screen ── -->
  <div class="landing-screen" id="landingScreen">
    <div class="landing-card">
      <span class="logo-icon">👁</span>
      <div class="logo-text">ARGUS</div>
      <div class="tagline">AI that never blinks</div>

      <div class="input-group">
        <label>Student Name</label>
        <input type="text" id="studentName" placeholder="Enter your full name" autocomplete="off">
      </div>
      <div class="input-group">
        <label>Exam Code</label>
        <input type="text" id="examCode" placeholder="Enter exam code" autocomplete="off">
      </div>
      <button class="btn-primary" id="startExamBtn">Begin Exam Session</button>
    </div>
  </div>

  <!-- ── Exam Screen ── -->
  <div class="exam-screen" id="examScreen">
    <!-- Top Bar -->
    <div class="exam-topbar">
      <div class="topbar-left">
        <span class="topbar-logo">👁</span>
        <span class="topbar-title">ARGUS</span>
      </div>
      <div class="topbar-right">
        <div class="suspicion-badge" id="suspicionBadge">
          ⚠ Flags: <strong id="flagCount">0</strong>
        </div>
        <div class="timer-display" id="timerDisplay">30:00</div>
      </div>
    </div>

    <!-- Exam Content -->
    <div class="exam-content" id="examContent">
      <!-- Questions injected by JS -->
    </div>

    <!-- Webcam -->
    <div class="webcam-container" id="webcamContainer">
      <div class="rec-dot"></div>
      <div class="rec-label">REC</div>
      <video id="webcamVideo" autoplay muted playsinline></video>
    </div>
    <!-- Hidden canvas for snapshots -->
    <canvas id="snapshotCanvas" style="display:none;"></canvas>
  </div>

  <!-- ── Warning Popup ── -->
  <div class="warning-overlay" id="warningOverlay" style="display:none;">
    <div class="warning-card">
      <div class="warning-icon">🚨</div>
      <div class="warning-title">Suspicious Activity Detected</div>
      <div class="warning-text" id="warningText">ARGUS has detected suspicious activity. This incident has been logged and will be reviewed.</div>
      <button class="warning-dismiss" id="warningDismiss">I Understand</button>
    </div>
  </div>

  <!-- ── Fullscreen Required Modal ── -->
  <div class="warning-overlay" id="fullscreenModal" style="display:none;">
    <div class="warning-card" style="border-color: var(--warning);">
      <div class="warning-icon">🖥</div>
      <div class="warning-title" style="color: var(--warning);">Fullscreen Required</div>
      <div class="warning-text">Fullscreen is required during the exam</div>
      <button class="warning-dismiss" id="fullscreenReturnBtn" style="background: var(--accent);">Return to Exam</button>
    </div>
  </div>

<script>
// ══════════════════════════════════════════
// ARGUS — Student Proctoring Client
// ══════════════════════════════════════════

const EXAM_DURATION = 30 * 60;
const SNAPSHOT_INTERVAL = 30000; // 30 seconds

// ── Question Bank ──
const questions = [
  {
    type: 'essay',
    text: 'Explain the concept of artificial intelligence and its impact on modern society. Discuss at least three real-world applications and their ethical implications.'
  },
  {
    type: 'mcq',
    text: 'Which of the following is a supervised learning algorithm?',
    options: ['K-Means Clustering', 'Linear Regression', 'DBSCAN', 'Principal Component Analysis'],
    correct: 1
  },
  {
    type: 'true_false',
    text: 'Deep learning is a subset of machine learning that uses neural networks with multiple layers.',
    correct: true
  },
  {
    type: 'mcq',
    text: 'What does GPU stand for in the context of AI computing?',
    options: ['General Purpose Unit', 'Graphics Processing Unit', 'Global Processing Utility', 'Gradient Propagation Unit'],
    correct: 1
  },
  {
    type: 'short_answer',
    text: 'Name two common activation functions used in neural networks.'
  },
  {
    type: 'essay',
    text: 'Describe the differences between supervised and unsupervised machine learning. Provide examples of when each approach would be most appropriate.'
  },
  {
    type: 'true_false',
    text: 'Overfitting occurs when a model performs well on training data but poorly on unseen data.',
    correct: true
  },
  {
    type: 'mcq',
    text: 'Which technique is used to prevent overfitting in neural networks?',
    options: ['Dropout', 'Gradient Ascent', 'Data Duplication', 'Increasing Learning Rate'],
    correct: 0
  },
  {
    type: 'short_answer',
    text: 'What is the purpose of a loss function in machine learning?'
  },
  {
    type: 'true_false',
    text: 'Natural Language Processing (NLP) is exclusively used for translating languages.',
    correct: false
  }
];

let flags = [];
let flagCount = 0;
let timerSeconds = EXAM_DURATION;
let timerInterval = null;
let snapshotInterval = null;
let examStartTime = null;
let studentName = '';
let examCode = '';
let warningQueue = [];
let showingWarning = false;
let faceDetectionInterval = null;
let snapshots = [];
let webcamStream = null;
let proctoringAttached = false;
let examActive = false;
let fullscreenModalOpen = false;

// ── Elements ──
const landingScreen = document.getElementById('landingScreen');
const examScreen = document.getElementById('examScreen');
const startExamBtn = document.getElementById('startExamBtn');
const timerDisplay = document.getElementById('timerDisplay');
const flagCountEl = document.getElementById('flagCount');
const suspicionBadge = document.getElementById('suspicionBadge');
const warningOverlay = document.getElementById('warningOverlay');
const warningText = document.getElementById('warningText');
const warningDismiss = document.getElementById('warningDismiss');
const fullscreenModal = document.getElementById('fullscreenModal');
const fullscreenReturnBtn = document.getElementById('fullscreenReturnBtn');
const webcamVideo = document.getElementById('webcamVideo');
const examContent = document.getElementById('examContent');
const snapshotCanvas = document.getElementById('snapshotCanvas');

// ── Render Questions ──
function renderQuestions() {
  let html = '';
  questions.forEach((q, i) => {
    html += `<div class="exam-question-card" style="animation-delay:${i * 0.08}s">`;
    html += `<div class="question-number">Question ${i + 1} <span class="q-type-badge q-type-${q.type}">${formatType(q.type)}</span></div>`;
    html += `<div class="question-text">${q.text}</div>`;

    if (q.type === 'essay') {
      html += `<textarea class="answer-area" placeholder="Type your detailed answer here..." data-q="${i}"></textarea>`;
    } else if (q.type === 'short_answer') {
      html += `<input type="text" class="answer-input" placeholder="Type your answer here..." data-q="${i}">`;
    } else if (q.type === 'mcq') {
      html += `<div class="mcq-options">`;
      q.options.forEach((opt, oi) => {
        html += `<label class="mcq-option">
          <input type="radio" name="q${i}" value="${oi}" data-q="${i}">
          <span class="mcq-letter">${String.fromCharCode(65 + oi)}</span>
          <span class="mcq-text">${opt}</span>
        </label>`;
      });
      html += `</div>`;
    } else if (q.type === 'true_false') {
      html += `<div class="tf-options">
        <label class="tf-option">
          <input type="radio" name="q${i}" value="true" data-q="${i}">
          <span class="tf-btn tf-true">✓ True</span>
        </label>
        <label class="tf-option">
          <input type="radio" name="q${i}" value="false" data-q="${i}">
          <span class="tf-btn tf-false">✗ False</span>
        </label>
      </div>`;
    }

    html += `</div>`;
  });

  html += `<div class="end-exam-section">
    <div class="input-group">
      <label>Enter password to end exam</label>
      <input type="password" id="endPassword" placeholder="Exam end password">
    </div>
    <button class="btn-primary btn-danger" id="endExamBtn">End Exam</button>
  </div>`;

  examContent.innerHTML = html;

  document.getElementById('endExamBtn').addEventListener('click', () => {
    const pw = document.getElementById('endPassword').value;
    if (pw !== 'argus123') {
      alert('Incorrect password. You cannot end the exam without the correct password.');
      return;
    }
    endExam();
  });
}

function formatType(type) {
  const map = { essay: 'Essay', mcq: 'Multiple Choice', true_false: 'True / False', short_answer: 'Short Answer' };
  return map[type] || type;
}

// ── Start Exam ──
startExamBtn.addEventListener('click', async () => {
  studentName = document.getElementById('studentName').value.trim();
  examCode = document.getElementById('examCode').value.trim();
  if (!studentName || !examCode) {
    alert('Please enter your name and exam code.');
    return;
  }

  const originalBtnText = startExamBtn.textContent;
  startExamBtn.disabled = true;
  startExamBtn.textContent = 'Requesting camera permission...';

  try {
    await ensureCameraPermission();
    startExam();
  } catch (e) {
    alert('Camera permission is required to start the exam.');
  } finally {
    startExamBtn.disabled = false;
    startExamBtn.textContent = originalBtnText;
  }
});

function startExam() {
  if (!webcamStream) {
    alert('Camera permission is required to start the exam.');
    return;
  }

  // Reset per-session state
  flags = [];
  snapshots = [];
  flagCount = 0;
  timerSeconds = EXAM_DURATION;
  warningQueue = [];
  showingWarning = false;

  flagCountEl.textContent = '0';
  suspicionBadge.className = 'suspicion-badge';

  localStorage.setItem('argus_student', studentName);
  localStorage.setItem('argus_examCode', examCode);
  localStorage.setItem('argus_flags', '[]');
  localStorage.setItem('argus_snapshots', '[]');
  localStorage.setItem('argus_startTime', Date.now().toString());

  renderQuestions();

  // Only transition to the exam screen after permission + credentials
  landingScreen.style.display = 'none';
  examScreen.style.display = 'block';

  // Attach stream once we show the exam UI
  webcamVideo.srcObject = webcamStream;

  // Exam "start moment" happens here (timer/flags/timestamps rely on this)
  examStartTime = Date.now();
  examActive = true;

  // Fullscreen should be activated after permission + credentials
  enterFullscreen();

  // Proctoring and timers must start ONLY here
  attachProctoring();
  startTimer();
  initFaceDetection();
  startSnapshots();
}

// ── Fullscreen ──
function enterFullscreen() {
  const el = document.documentElement;
  (el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen || function(){}).call(el);
}

// ── Webcam ──
async function ensureCameraPermission() {
  if (webcamStream) return webcamStream;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    webcamStream = stream;
    return webcamStream;
  } catch (e) {
    console.warn('Webcam access denied:', e);
    throw e;
  }
}

// ── Snapshots ──
function startSnapshots() {
  captureSnapshot('exam_start');
  snapshotInterval = setInterval(() => captureSnapshot('periodic'), SNAPSHOT_INTERVAL);
}

function captureSnapshot(reason) {
  if (!webcamVideo.srcObject || webcamVideo.videoWidth === 0) return;
  snapshotCanvas.width = 320;
  snapshotCanvas.height = 240;
  const ctx = snapshotCanvas.getContext('2d');
  ctx.drawImage(webcamVideo, 0, 0, 320, 240);
  const dataUrl = snapshotCanvas.toDataURL('image/jpeg', 0.6);
  const entry = {
    timestamp: new Date().toISOString(),
    elapsed: Math.round((Date.now() - examStartTime) / 1000),
    reason: reason,
    image: dataUrl
  };
  snapshots.push(entry);
  // Keep max 40 to avoid localStorage limits
  if (snapshots.length > 40) snapshots.shift();
  localStorage.setItem('argus_snapshots', JSON.stringify(snapshots));
}

// ── Timer ──
function startTimer() {
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      endExam();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60).toString().padStart(2, '0');
  const s = (timerSeconds % 60).toString().padStart(2, '0');
  timerDisplay.textContent = `${m}:${s}`;
}

// ── Flagging ──
function addFlag(type, detail) {
  const entry = {
    type, detail,
    timestamp: new Date().toISOString(),
    elapsedSeconds: Math.round((Date.now() - examStartTime) / 1000)
  };
  flags.push(entry);
  flagCount++;
  flagCountEl.textContent = flagCount;

  if (flagCount >= 5) suspicionBadge.className = 'suspicion-badge danger';
  else if (flagCount >= 2) suspicionBadge.className = 'suspicion-badge warning';

  localStorage.setItem('argus_flags', JSON.stringify(flags));

  // Capture snapshot on flag
  captureSnapshot('flag_' + type);

  showWarning(detail);
}

function showWarning(text) {
  warningQueue.push(text);
  if (!showingWarning) displayNextWarning();
}

function displayNextWarning() {
  if (warningQueue.length === 0) { showingWarning = false; return; }
  showingWarning = true;
  warningText.textContent = 'ARGUS has detected suspicious activity: ' + warningQueue.shift();
  warningOverlay.style.display = 'flex';
}

warningDismiss.addEventListener('click', () => {
  warningOverlay.style.display = 'none';
  displayNextWarning();
});

function showFullscreenRequiredModal() {
  if (!examActive) return;
  if (fullscreenModalOpen) return;
  fullscreenModalOpen = true;
  fullscreenModal.style.display = 'flex';
}

function hideFullscreenRequiredModal() {
  fullscreenModalOpen = false;
  fullscreenModal.style.display = 'none';
}

fullscreenReturnBtn.addEventListener('click', () => {
  // Browser fullscreen requires a user gesture → only request fullscreen here.
  enterFullscreen();
  hideFullscreenRequiredModal();
});

// ── Proctoring Listeners ──
function attachProctoring() {
  if (proctoringAttached) return;
  proctoringAttached = true;

  document.addEventListener('visibilitychange', () => {
    if (document.hidden) addFlag('tab_switch', 'Student switched to another tab');
  });

  function onFullscreenChange() {
    if (!examActive) return;
    if (!document.fullscreenElement) {
      addFlag('fullscreen_exit', 'Student exited fullscreen mode');
      showFullscreenRequiredModal();
    }
  }

  document.addEventListener('fullscreenchange', onFullscreenChange);
  document.addEventListener('webkitfullscreenchange', onFullscreenChange);

  document.addEventListener('copy', (e) => {
    e.preventDefault();
    addFlag('copy_attempt', 'Student attempted to copy content (Ctrl+C)');
  });

  document.addEventListener('paste', (e) => {
    e.preventDefault();
    addFlag('paste_attempt', 'Student attempted to paste content (Ctrl+V)');
  }, true);

  document.addEventListener('keydown', (e) => {
    const key = (e.key || '').toLowerCase();

    // ESC handling: can't always prevent leaving fullscreen, but we always flag + warn.
    if (key === 'escape') {
      try { e.preventDefault(); } catch (_) {}
      addFlag('escape_attempt', 'Student pressed ESC (attempted to exit fullscreen)');
      showFullscreenRequiredModal();
      return;
    }

    const isModifier = e.ctrlKey || e.metaKey;
    if (!isModifier) return;

    // Block common shortcuts
    if (key === 'c') {
      e.preventDefault();
      addFlag('copy_attempt', 'Student attempted to copy content (Ctrl+C)');
    } else if (key === 'v') {
      e.preventDefault();
      addFlag('paste_attempt', 'Student attempted to paste content (Ctrl+V)');
    } else if (key === 'a') {
      e.preventDefault();
      addFlag('select_all_attempt', 'Student attempted to select all content (Ctrl+A)');
    } else if (key === 'u') {
      e.preventDefault();
      addFlag('view_source_attempt', 'Student attempted to view source (Ctrl+U)');
    }
  }, true);

  document.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    addFlag('right_click', 'Student attempted to right-click');
  });
}

// ── Face Detection ──
async function initFaceDetection() {
  if (typeof faceapi === 'undefined') { console.warn('face-api.js not loaded'); return; }
  try {
    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    console.log('Face detection model loaded');

    faceDetectionInterval = setInterval(async () => {
      if (!webcamVideo.srcObject) return;
      try {
        const detections = await faceapi.detectAllFaces(webcamVideo, new faceapi.TinyFaceDetectorOptions());
        if (detections.length === 0) addFlag('no_face', 'No face detected in webcam feed');
        else if (detections.length > 1) addFlag('multiple_faces', `Multiple faces detected (${detections.length} faces)`);
      } catch(e) {}
    }, 8000);
  } catch (e) { console.warn('Face detection init failed:', e); }
}

// ── End Exam ──
function endExam() {
  examActive = false;
  hideFullscreenRequiredModal();

  clearInterval(timerInterval);
  clearInterval(snapshotInterval);
  if (faceDetectionInterval) clearInterval(faceDetectionInterval);

  captureSnapshot('exam_end');

  const duration = Math.round((Date.now() - examStartTime) / 1000);
  localStorage.setItem('argus_duration', duration.toString());
  localStorage.setItem('argus_flags', JSON.stringify(flags));
  localStorage.setItem('argus_snapshots', JSON.stringify(snapshots));

  if (webcamVideo.srcObject) webcamVideo.srcObject.getTracks().forEach(t => t.stop());
  if (document.fullscreenElement) document.exitFullscreen();

  alert('Exam session ended. Your data has been recorded by ARGUS.');
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
