<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARGUS — Invigilator Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

  <!-- ── Login Screen ── -->
  <div class="landing-screen" id="loginScreen">
    <div class="landing-card">
      <span class="logo-icon">👁</span>
      <div class="logo-text">ARGUS</div>
      <div class="tagline">Invigilator Dashboard</div>

      <div class="input-group">
        <label>Admin Password</label>
        <input type="password" id="adminPassword" placeholder="Enter admin password" autocomplete="off">
      </div>
      <button class="btn-primary" id="loginBtn">Access Dashboard</button>
    </div>
  </div>

  <!-- ── Dashboard ── -->
  <div class="dashboard" id="dashboard">
    <div class="dash-header">
      <div class="dash-header-left">
        <span class="topbar-logo">👁</span>
        <div>
          <div class="topbar-title">ARGUS</div>
          <div class="dash-subtitle">Invigilator Dashboard</div>
        </div>
      </div>
      <div style="display:flex;gap:12px;align-items:center;">
        <button class="btn-primary" id="analyzeBtn" style="width:auto;">🤖 Analyze with AI</button>
        <button class="btn-outline" id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="dash-body">
      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Student</div>
          <div class="stat-value" id="dashStudent" style="font-size:22px;">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Exam Duration</div>
          <div class="stat-value" id="dashDuration" style="font-size:22px;">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Flags</div>
          <div class="stat-value" id="dashFlagCount" style="color:var(--accent);">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Suspicion Score</div>
          <div class="stat-value" id="dashScore">0</div>
          <div id="dashRiskBadge" class="risk-badge green" style="margin-top:8px;">CLEAN</div>
        </div>
      </div>

      <!-- Recalibration Notifications -->
      <div id="recalibNotifications" style="display:none; margin-bottom:20px;"></div>

      <!-- Webcam Snapshots -->
      <div class="section-title">📸 Webcam Snapshots</div>
      <div class="snapshots-gallery" id="snapshotsGallery">
        <div class="snapshot-empty">No snapshots captured</div>
      </div>

      <!-- Flags Table -->
      <div class="section-title">📋 Flagged Events</div>
      <table class="flags-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Timestamp</th>
            <th>Elapsed</th>
            <th>Type</th>
            <th>Detail</th>
          </tr>
        </thead>
        <tbody id="flagsBody">
          <tr><td colspan="5" style="text-align:center;padding:24px;color:var(--text-muted);">No flags recorded</td></tr>
        </tbody>
      </table>

      <!-- AI Report -->
      <div class="ai-report-section" id="aiReportSection">
        <div class="section-title">🤖 AI Analysis Report</div>
        <div class="ai-verdict" id="aiVerdict"></div>
        <div class="ai-reasoning" id="aiReasoning"></div>
        <div class="btn-group">
          <button class="btn-primary" id="downloadPdfBtn" style="width:auto;">📥 Download Report as PDF</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Snapshot Lightbox -->
  <div class="snapshot-lightbox" id="snapshotLightbox" style="display:none;" onclick="closeLightbox()">
    <div class="lightbox-content" onclick="event.stopPropagation()">
      <img id="lightboxImg" src="" alt="Snapshot">
      <div class="lightbox-meta" id="lightboxMeta"></div>
      <button class="warning-dismiss" onclick="closeLightbox()" style="margin-top:12px;">Close</button>
    </div>
  </div>

<script>
// ══════════════════════════════════════════
// ARGUS — Invigilator Dashboard
// ══════════════════════════════════════════

const OPENROUTER_API_KEY = "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";

const loginScreen = document.getElementById('loginScreen');
const dashboard = document.getElementById('dashboard');
const loginBtn = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');
const analyzeBtn = document.getElementById('analyzeBtn');
const downloadPdfBtn = document.getElementById('downloadPdfBtn');

let aiReport = null;

// ── Login ──
loginBtn.addEventListener('click', () => {
  const pw = document.getElementById('adminPassword').value;
  if (pw !== 'admin123') { alert('Invalid password.'); return; }
  loginScreen.style.display = 'none';
  dashboard.style.display = 'block';
  loadDashboard();
});

document.getElementById('adminPassword').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') loginBtn.click();
});

logoutBtn.addEventListener('click', () => {
  dashboard.style.display = 'none';
  loginScreen.style.display = 'flex';
});

// ── Load Dashboard ──
function loadDashboard() {
  const student = localStorage.getItem('argus_student') || 'Unknown';
  const durationSec = parseInt(localStorage.getItem('argus_duration') || '0');
  const flags = JSON.parse(localStorage.getItem('argus_flags') || '[]');
  const snapshots = JSON.parse(localStorage.getItem('argus_snapshots') || '[]');

  document.getElementById('dashStudent').textContent = student;
  document.getElementById('dashDuration').textContent = formatDuration(durationSec);
  document.getElementById('dashFlagCount').textContent = flags.length;

  const scoreMap = {
    'tab_switch': 15, 'fullscreen_exit': 15, 'copy_attempt': 20,
    'right_click': 10, 'multiple_faces': 25, 'no_face': 10, 'gaze_away': 8,
    'recalibration_requested': 5, 'recalibration_complete': 0
  };
  let score = 0;
  flags.forEach(f => { score += scoreMap[f.type] || 10; });
  score = Math.min(score, 100);

  const scoreEl = document.getElementById('dashScore');
  const badgeEl = document.getElementById('dashRiskBadge');
  scoreEl.textContent = score + '/100';

  if (score <= 20) {
    scoreEl.className = 'stat-value risk-green'; badgeEl.className = 'risk-badge green'; badgeEl.textContent = 'CLEAN';
  } else if (score <= 50) {
    scoreEl.className = 'stat-value risk-yellow'; badgeEl.className = 'risk-badge yellow'; badgeEl.textContent = 'SUSPICIOUS';
  } else {
    scoreEl.className = 'stat-value risk-red'; badgeEl.className = 'risk-badge red'; badgeEl.textContent = 'HIGH RISK';
  }

  // Flags table
  const tbody = document.getElementById('flagsBody');
  if (flags.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--text-muted);">No flags recorded — student appears clean</td></tr>';
  } else {
    tbody.innerHTML = flags.map((f, i) => {
      const severe = ['multiple_faces', 'copy_attempt', 'recalibration_requested'].includes(f.type);
      return `<tr>
        <td>${i + 1}</td>
        <td>${new Date(f.timestamp).toLocaleTimeString()}</td>
        <td>${formatDuration(f.elapsedSeconds)}</td>
        <td><span class="flag-type-badge ${severe ? 'severe' : ''}">${f.type.replace(/_/g, ' ')}</span></td>
        <td>${f.detail}</td>
      </tr>`;
    }).join('');
  }

  // Snapshots gallery
  const gallery = document.getElementById('snapshotsGallery');
  if (snapshots.length === 0) {
    gallery.innerHTML = '<div class="snapshot-empty">No snapshots captured during this session</div>';
  } else {
    gallery.innerHTML = snapshots.map((s, i) => {
      const isFlag = s.reason.startsWith('flag_');
      return `<div class="snapshot-card ${isFlag ? 'snapshot-flagged' : ''}" onclick="openLightbox(${i})">
        <img src="${s.image}" alt="Snapshot ${i+1}">
        <div class="snapshot-info">
          <span class="snapshot-time">${new Date(s.timestamp).toLocaleTimeString()}</span>
          <span class="snapshot-reason ${isFlag ? 'reason-flag' : ''}">${formatReason(s.reason)}</span>
        </div>
      </div>`;
    }).join('');
  }

  // Recalibration notifications
  var recalibEvents = JSON.parse(localStorage.getItem('argus_recalibrations') || '[]');
  var recalibContainer = document.getElementById('recalibNotifications');
  if (recalibEvents.length > 0) {
    recalibContainer.style.display = 'block';
    recalibContainer.innerHTML = recalibEvents.map(function(evt) {
      return '<div style="background:rgba(245,158,11,0.1);border:1px solid var(--warning);border-radius:12px;padding:14px 20px;margin-bottom:8px;display:flex;align-items:center;gap:10px;">' +
        '<span style="font-size:20px;">⚠️</span>' +
        '<span style="color:var(--warning);font-size:13px;font-weight:500;">Student ' + (evt.student || student) + ' requested recalibration at ' + new Date(evt.timestamp).toLocaleTimeString() + '</span>' +
      '</div>';
    }).join('');
  } else {
    recalibContainer.style.display = 'none';
  }
}

function formatReason(r) {
  if (r === 'exam_start') return '▶ Start';
  if (r === 'exam_end') return '⏹ End';
  if (r === 'periodic') return '🔄 Periodic';
  if (r.startsWith('flag_')) return '🚨 ' + r.replace('flag_', '').replace(/_/g, ' ');
  return r;
}

function formatDuration(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return `${m}m ${s}s`;
}

// ── Lightbox ──
function openLightbox(index) {
  const snapshots = JSON.parse(localStorage.getItem('argus_snapshots') || '[]');
  const s = snapshots[index];
  if (!s) return;
  document.getElementById('lightboxImg').src = s.image;
  document.getElementById('lightboxMeta').innerHTML =
    `<strong>${new Date(s.timestamp).toLocaleString()}</strong> · Elapsed: ${formatDuration(s.elapsed)} · Reason: ${formatReason(s.reason)}`;
  document.getElementById('snapshotLightbox').style.display = 'flex';
}

function closeLightbox() {
  document.getElementById('snapshotLightbox').style.display = 'none';
}

// ── Helper: Show error in UI ──
function showError(message) {
  console.error('showError:', message);
  const section = document.getElementById('aiReportSection');
  section.classList.add('visible');

  const verdictEl = document.getElementById('aiVerdict');
  verdictEl.textContent = '🔍 Verdict: ERROR';
  verdictEl.style.color = 'var(--danger)';

  document.getElementById('aiReasoning').textContent =
    `AI analysis failed: ${message}\n\nCheck browser console (F12) for full details.`;

  section.scrollIntoView({ behavior: 'smooth' });
}

// ── Helper: Display AI report in UI ──
function displayReport(text) {
  console.log('displayReport called with text length:', text.length);
  aiReport = text;

  const verdictMatch = text.match(/VERDICT:\s*(CLEAN|SUSPICIOUS|HIGH RISK)/i);
  const verdict = verdictMatch ? verdictMatch[1].toUpperCase() : 'UNKNOWN';
  console.log('Parsed verdict:', verdict);

  const verdictEl = document.getElementById('aiVerdict');
  verdictEl.textContent = '🔍 Verdict: ' + verdict;
  if (verdict === 'CLEAN') verdictEl.style.color = 'var(--success)';
  else if (verdict === 'SUSPICIOUS') verdictEl.style.color = 'var(--warning)';
  else verdictEl.style.color = 'var(--danger)';

  document.getElementById('aiReasoning').textContent = text;

  const section = document.getElementById('aiReportSection');
  section.classList.add('visible');
  section.scrollIntoView({ behavior: 'smooth' });
}

// ── AI Analysis (OpenRouter) ──
analyzeBtn.addEventListener('click', async () => {
  console.log('=== AI Analysis Started ===');

  // Get flags from localStorage (support both key formats)
  const sessionData = JSON.parse(localStorage.getItem('argusSession') || '{}');
  const flags = JSON.parse(localStorage.getItem('argusFlags') || localStorage.getItem('argus_flags') || '[]');
  const student = sessionData.studentName || localStorage.getItem('argus_student') || 'Unknown';
  const duration = sessionData.duration || parseInt(localStorage.getItem('argus_duration') || '0');
  const snapshots = JSON.parse(localStorage.getItem('argus_snapshots') || '[]');

  console.log('Session data:', { student, duration, flagCount: flags.length, snapshotCount: snapshots.length });
  console.log('Flags:', flags);

  analyzeBtn.disabled = true;
  analyzeBtn.innerHTML = '<span class="spinner"></span>Analyzing...';

  const prompt = `You are an AI exam integrity analyzer for ARGUS proctoring system. Analyze this exam session data and give a verdict.

Student: ${student}
Duration: ${typeof duration === 'number' ? formatDuration(duration) : duration}
Total Flags: ${flags.length}

Flag Details:
${JSON.stringify(flags, null, 2)}

Give your response in this exact format:
VERDICT: [CLEAN/SUSPICIOUS/HIGH RISK]
SCORE: [0-100]
SUMMARY: [2-3 sentences]
DETAILS: [bullet points of concerns]`;

  console.log('Prompt constructed, length:', prompt.length);

  try {
    console.log('Calling OpenRouter API...');
    console.log('Using model: google/gemini-2.0-flash-001');
    console.log('API key prefix:', OPENROUTER_API_KEY.substring(0, 15) + '...');

    const response = await fetch(
      "https://openrouter.ai/api/v1/chat/completions",
      {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${OPENROUTER_API_KEY}`,
          "Content-Type": "application/json",
          "HTTP-Referer": window.location.href,
          "X-Title": "ARGUS Proctoring"
        },
        body: JSON.stringify({
          model: "google/gemini-2.0-flash-001",
          messages: [{
            role: "user",
            content: prompt
          }],
          max_tokens: 1000
        })
      }
    );

    console.log('Response status:', response.status, response.statusText);
    console.log('Response headers:', [...response.headers.entries()]);

    const data = await response.json();
    console.log('Full API response:', JSON.stringify(data, null, 2));

    if (data.error) {
      console.error('API returned error object:', data.error);
      showError('API Error: ' + (data.error.message || JSON.stringify(data.error)));
      return;
    }

    if (!data.choices || !data.choices[0] || !data.choices[0].message) {
      console.error('Unexpected response structure:', data);
      showError('Unexpected API response format. Check console for details.');
      return;
    }

    const text = data.choices[0].message.content;
    console.log('AI Response text:', text);

    displayReport(text);

  } catch (error) {
    console.error('Fetch error:', error);
    console.error('Error name:', error.name);
    console.error('Error message:', error.message);
    console.error('Error stack:', error.stack);
    showError('Network error: ' + error.message);
  } finally {
    analyzeBtn.disabled = false;
    analyzeBtn.innerHTML = '🤖 Analyze with AI';
    console.log('=== AI Analysis Finished ===');
  }
});

// ── Download PDF ──
downloadPdfBtn.addEventListener('click', () => {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const student = localStorage.getItem('argus_student') || 'Unknown';
  const duration = parseInt(localStorage.getItem('argus_duration') || '0');
  const flags = JSON.parse(localStorage.getItem('argus_flags') || '[]');

  let y = 20;
  doc.setFontSize(22);
  doc.setFont('helvetica', 'bold');
  doc.text('ARGUS — Proctoring Report', 20, y); y += 10;
  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  doc.text('AI that never blinks', 20, y); y += 12;

  doc.setDrawColor(33, 150, 243);
  doc.line(20, y, 190, y); y += 10;

  doc.setFontSize(12);
  doc.text(`Student: ${student}`, 20, y); y += 7;
  doc.text(`Duration: ${formatDuration(duration)}`, 20, y); y += 7;
  doc.text(`Total Flags: ${flags.length}`, 20, y); y += 7;
  doc.text(`Generated: ${new Date().toLocaleString()}`, 20, y); y += 14;

  doc.setFontSize(14);
  doc.setFont('helvetica', 'bold');
  doc.text('Flagged Events', 20, y); y += 8;

  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  flags.forEach((f, i) => {
    if (y > 270) { doc.addPage(); y = 20; }
    doc.text(`${i+1}. [${new Date(f.timestamp).toLocaleTimeString()}] ${f.type} — ${f.detail}`, 20, y);
    y += 6;
  });

  if (aiReport) {
    y += 10;
    if (y > 250) { doc.addPage(); y = 20; }
    doc.setFontSize(14);
    doc.setFont('helvetica', 'bold');
    doc.text('AI Analysis', 20, y); y += 8;

    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');
    const lines = doc.splitTextToSize(aiReport, 170);
    lines.forEach(line => {
      if (y > 280) { doc.addPage(); y = 20; }
      doc.text(line, 20, y); y += 5;
    });
  }

  doc.save(`ARGUS_Report_${student.replace(/\s+/g, '_')}.pdf`);
});
</script>
</body>
</html>
