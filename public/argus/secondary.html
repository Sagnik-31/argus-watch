<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ARGUS — Secondary Camera</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <!-- TensorFlow.js + COCO-SSD for object detection -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f8f9fc;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .header {
      width: 100%;
      background: #ffffff;
      border-bottom: 1px solid rgba(0,0,0,0.08);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-logo { font-size: 24px; }
    .header-title {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 3px;
    }
    .header-sub {
      font-size: 10px;
      font-weight: 600;
      color: #3B82F6;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
      background: rgba(148,163,184,0.1);
      color: #94a3b8;
    }
    .status-pill.connected {
      background: rgba(34,197,94,0.1);
      color: #22c55e;
    }
    .status-pill.error {
      background: rgba(239,68,68,0.1);
      color: #ef4444;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #94a3b8;
    }
    .status-pill.connected .status-dot {
      background: #22c55e;
      animation: pulse 2s infinite;
    }
    .status-pill.error .status-dot { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .camera-container {
      flex: 1;
      width: 100%;
      position: relative;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #cameraFeed {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Detection canvas overlays the video */
    #detectionCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .camera-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.6));
      padding: 20px;
      color: #fff;
    }

    .camera-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .camera-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.8;
    }

    .snapshot-counter {
      font-size: 13px;
      font-weight: 600;
      background: rgba(255,255,255,0.15);
      padding: 4px 12px;
      border-radius: 12px;
      backdrop-filter: blur(4px);
    }

    .rec-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 700;
      color: #ef4444;
    }
    .rec-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
      animation: recBlink 1s infinite;
    }
    @keyframes recBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    .connect-screen {
      flex: 1;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }

    .connect-icon { font-size: 64px; margin-bottom: 20px; }
    .connect-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .connect-text {
      font-size: 14px;
      color: #64748b;
      max-width: 300px;
      line-height: 1.5;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(59,130,246,0.2);
      border-top-color: #3B82F6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-text { color: #ef4444; font-weight: 600; margin-top: 12px; }

    .instructions {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 16px 24px;
      border-radius: 12px;
      text-align: center;
      font-size: 13px;
      line-height: 1.5;
      backdrop-filter: blur(8px);
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.5s;
    }
    .instructions.hidden { opacity: 0; }

    canvas#snapshotCanvas { display: none; }

    /* Detection alert banner */
    .detection-banner {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(239, 68, 68, 0.9);
      color: #fff;
      padding: 8px 20px;
      border-radius: 24px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 20px rgba(239,68,68,0.4);
      display: none;
      z-index: 10;
      animation: alertPulse 1s ease-in-out infinite;
      white-space: nowrap;
    }
    .detection-banner.visible { display: flex; align-items: center; gap: 8px; }

    @keyframes alertPulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(239,68,68,0.4); }
      50% { box-shadow: 0 4px 30px rgba(239,68,68,0.7); }
    }

    /* Object detection status badge */
    .detection-status {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 600;
      backdrop-filter: blur(4px);
      z-index: 10;
      display: none;
    }
    .detection-status.active {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .detection-status .ai-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }
    .detection-status.alert-mode {
      background: rgba(239,68,68,0.8);
    }
    .detection-status.alert-mode .ai-dot {
      background: #fff;
    }

    /* Camera border flash on detection */
    .camera-container.alert-flash {
      box-shadow: inset 0 0 40px rgba(239,68,68,0.5);
    }

    /* Loading model overlay */
    .model-loading-overlay {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 10px 20px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      backdrop-filter: blur(8px);
      z-index: 10;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .model-loading-overlay.visible {
      display: flex;
    }
    .model-loading-overlay .mini-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="header-logo">👁</span>
      <div>
        <div class="header-title">ARGUS</div>
        <div class="header-sub">Secondary Camera</div>
      </div>
    </div>
    <div class="status-pill" id="statusPill">
      <span class="status-dot"></span>
      <span id="statusText">Connecting...</span>
    </div>
  </div>

  <!-- Connecting Screen -->
  <div class="connect-screen" id="connectScreen">
    <div class="connect-icon">📱</div>
    <div class="connect-title">Connecting to Exam Session</div>
    <div class="connect-text">Establishing secure connection to the proctoring system...</div>
    <div class="spinner"></div>
    <div id="connectError" class="error-text" style="display:none;"></div>
  </div>

  <!-- Camera Screen (hidden until connected) -->
  <div class="camera-container" id="cameraScreen" style="display:none;">
    <video id="cameraFeed" autoplay playsinline></video>
    <canvas id="detectionCanvas"></canvas>

    <!-- AI Detection Status -->
    <div class="detection-status" id="detectionStatus">
      <span class="ai-dot"></span>
      <span id="detectionStatusText">AI Scanning...</span>
    </div>

    <!-- Detection Alert Banner -->
    <div class="detection-banner" id="detectionBanner">
      <span>🚨</span>
      <span id="detectionBannerText">Object Detected</span>
    </div>

    <!-- Model Loading -->
    <div class="model-loading-overlay" id="modelLoading">
      <span class="mini-spinner"></span>
      <span>Loading AI model...</span>
    </div>

    <div class="instructions" id="cameraInstructions">
      📸 Place this phone facing your keyboard & desk area.<br>
      Keep it steady — ARGUS is monitoring.
    </div>
    <div class="camera-overlay">
      <div class="camera-info">
        <div class="rec-indicator">
          <span class="rec-dot"></span>
          <span>MONITORING</span>
        </div>
        <div class="snapshot-counter" id="snapshotCounter">Snapshots: 0</div>
      </div>
    </div>
  </div>

  <canvas id="snapshotCanvas"></canvas>

<script>
// ══════════════════════════════════════════
// ARGUS — Secondary Camera (Phone)
// With TensorFlow.js COCO-SSD Object Detection
// ══════════════════════════════════════════

const SNAPSHOT_INTERVAL = 15000; // 15 seconds
const DETECTION_INTERVAL = 2000; // 2 seconds between detections
const DETECTION_CONFIDENCE_THRESHOLD = 0.55; // minimum confidence to flag

// Suspicious object classes to flag
const SUSPICIOUS_OBJECTS = [
  'book', 'cell phone', 'laptop', 'remote',
  'scissors', 'backpack', 'bottle', 'mouse',
  'tablet', 'notebook'
];

// Color map for bounding boxes
const OBJECT_COLORS = {
  'book': '#ef4444',
  'cell phone': '#dc2626',
  'laptop': '#f97316',
  'remote': '#f59e0b',
  'scissors': '#eab308',
  'backpack': '#a855f7',
  'bottle': '#6366f1',
  'mouse': '#8b5cf6',
  'default': '#3b82f6'
};

let peer = null;
let conn = null;
let cameraStream = null;
let snapshotCount = 0;
let snapshotInterval = null;

// Object detection state
let cocoModel = null;
let detectionLoop = null;
let detectionActive = false;
let lastDetectedObjects = [];
let detectionAlertCooldowns = {}; // per-object cooldowns

// Get peer ID from URL params
const urlParams = new URLSearchParams(window.location.search);
const remotePeerId = urlParams.get('peer');
const sessionId = urlParams.get('session');

console.log('[ARGUS-SEC] Remote peer ID:', remotePeerId);
console.log('[ARGUS-SEC] Session ID:', sessionId);

if (!remotePeerId) {
  showError('No session ID found. Please scan the QR code from the exam screen.');
} else {
  initConnection();
}

function initConnection() {
  try {
    // Create our peer with a random ID — use 0.peerjs.com to avoid blocked default server
    peer = new Peer(undefined, {
      host: '0.peerjs.com',
      port: 443,
      path: '/',
      secure: true,
      config: {
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' }
        ]
      }
    });

    peer.on('open', (myId) => {
      console.log('[ARGUS-SEC] My peer ID:', myId);
      updateStatus('Connecting to exam...', '');

      // Connect to the PC
      conn = peer.connect(remotePeerId, { reliable: true });

      conn.on('open', () => {
        console.log('[ARGUS-SEC] ✅ Connected to exam session!');
        updateStatus('Connected', 'connected');

        // Send handshake
        conn.send(JSON.stringify({
          type: 'handshake',
          device: 'secondary_camera',
          session: sessionId,
          timestamp: Date.now()
        }));

        // Start camera
        startCamera();
      });

      conn.on('close', () => {
        console.log('[ARGUS-SEC] Connection closed');
        updateStatus('Disconnected', 'error');
        stopMonitoring();
      });

      conn.on('error', (err) => {
        console.error('[ARGUS-SEC] Connection error:', err);
        updateStatus('Connection error', 'error');
      });

      // Listen for messages from PC
      conn.on('data', (data) => {
        try {
          const msg = JSON.parse(data);
          if (msg.type === 'exam_ended') {
            stopMonitoring();
            updateStatus('Exam ended', '');
            document.getElementById('cameraInstructions').textContent = '✅ Exam has ended. You can close this page.';
            document.getElementById('cameraInstructions').classList.remove('hidden');
          }
        } catch (e) {}
      });
    });

    peer.on('error', (err) => {
      console.error('[ARGUS-SEC] Peer error:', err);
      if (err.type === 'peer-unavailable') {
        showError('Exam session not found. The QR code may have expired.');
      } else {
        showError('Connection failed: ' + err.message);
      }
    });
  } catch (e) {
    showError('Failed to initialize: ' + e.message);
  }
}

async function startCamera() {
  try {
    // Request rear camera
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width: { ideal: 640 },
        height: { ideal: 480 }
      },
      audio: false
    });

    const video = document.getElementById('cameraFeed');
    video.srcObject = cameraStream;

    // Show camera screen, hide connect screen
    document.getElementById('connectScreen').style.display = 'none';
    document.getElementById('cameraScreen').style.display = 'flex';

    // Hide instructions after 5 seconds
    setTimeout(() => {
      document.getElementById('cameraInstructions').classList.add('hidden');
    }, 5000);

    // Start periodic snapshots
    snapshotInterval = setInterval(captureAndSend, SNAPSHOT_INTERVAL);

    // Take first snapshot after 3 seconds
    setTimeout(captureAndSend, 3000);

    console.log('[ARGUS-SEC] ✅ Camera active, monitoring started');

    // Load object detection model
    loadDetectionModel();
  } catch (e) {
    console.error('[ARGUS-SEC] Camera error:', e);
    showError('Camera access denied. Please allow camera access and reload.');
  }
}

// ══════════════════════════════════════════
// OBJECT DETECTION (TensorFlow.js COCO-SSD)
// ══════════════════════════════════════════

async function loadDetectionModel() {
  const loadingOverlay = document.getElementById('modelLoading');
  loadingOverlay.classList.add('visible');

  try {
    console.log('[ARGUS-SEC] 🧠 Loading COCO-SSD model...');

    // Load COCO-SSD model (lightweight, works on mobile)
    cocoModel = await cocoSsd.load({
      base: 'lite_mobilenet_v2' // Lighter model for mobile performance
    });

    console.log('[ARGUS-SEC] 🧠 ✅ COCO-SSD model loaded!');
    loadingOverlay.classList.remove('visible');

    // Show AI detection status
    const statusEl = document.getElementById('detectionStatus');
    statusEl.classList.add('active');

    // Notify PC that AI detection is ready
    if (conn && conn.open) {
      conn.send(JSON.stringify({
        type: 'detection_ready',
        timestamp: Date.now()
      }));
    }

    // Start detection loop
    startDetectionLoop();
  } catch (e) {
    console.error('[ARGUS-SEC] 🧠 Failed to load COCO-SSD:', e);
    loadingOverlay.classList.remove('visible');

    // Show error but keep camera working
    const statusEl = document.getElementById('detectionStatus');
    statusEl.classList.add('active');
    document.getElementById('detectionStatusText').textContent = 'AI unavailable';
  }
}

function startDetectionLoop() {
  if (detectionActive) return;
  detectionActive = true;

  console.log('[ARGUS-SEC] 🧠 Object detection loop started (every ' + DETECTION_INTERVAL + 'ms)');

  detectionLoop = setInterval(async () => {
    if (!cocoModel || !detectionActive) return;

    const video = document.getElementById('cameraFeed');
    if (!video || video.videoWidth === 0 || video.paused) return;

    try {
      // Run COCO-SSD detection
      const predictions = await cocoModel.detect(video);

      // Filter for suspicious objects with enough confidence
      const suspicious = predictions.filter(p =>
        SUSPICIOUS_OBJECTS.includes(p.class) &&
        p.score >= DETECTION_CONFIDENCE_THRESHOLD
      );

      // Draw bounding boxes on canvas
      drawDetections(predictions, suspicious);

      // Handle suspicious detections
      if (suspicious.length > 0) {
        handleSuspiciousDetection(suspicious);
      } else {
        clearDetectionAlert();
      }

      lastDetectedObjects = suspicious;
    } catch (e) {
      console.warn('[ARGUS-SEC] Detection error:', e.message);
    }
  }, DETECTION_INTERVAL);
}

function drawDetections(allPredictions, suspicious) {
  const video = document.getElementById('cameraFeed');
  const canvas = document.getElementById('detectionCanvas');
  const ctx = canvas.getContext('2d');

  // Match canvas to video display size
  const rect = video.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;

  // Clear previous drawings
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Calculate scale factors (video resolution → display size)
  const scaleX = rect.width / video.videoWidth;
  const scaleY = rect.height / video.videoHeight;

  // Draw all suspicious detections with bounding boxes
  suspicious.forEach(pred => {
    const [x, y, width, height] = pred.bbox;
    const sx = x * scaleX;
    const sy = y * scaleY;
    const sw = width * scaleX;
    const sh = height * scaleY;

    const color = OBJECT_COLORS[pred.class] || OBJECT_COLORS.default;
    const confidence = Math.round(pred.score * 100);

    // Bounding box
    ctx.strokeStyle = color;
    ctx.lineWidth = 3;
    ctx.strokeRect(sx, sy, sw, sh);

    // Corner accents
    const cornerLen = Math.min(sw, sh) * 0.25;
    ctx.lineWidth = 4;
    // Top-left
    ctx.beginPath(); ctx.moveTo(sx, sy + cornerLen); ctx.lineTo(sx, sy); ctx.lineTo(sx + cornerLen, sy); ctx.stroke();
    // Top-right
    ctx.beginPath(); ctx.moveTo(sx + sw - cornerLen, sy); ctx.lineTo(sx + sw, sy); ctx.lineTo(sx + sw, sy + cornerLen); ctx.stroke();
    // Bottom-left
    ctx.beginPath(); ctx.moveTo(sx, sy + sh - cornerLen); ctx.lineTo(sx, sy + sh); ctx.lineTo(sx + cornerLen, sy + sh); ctx.stroke();
    // Bottom-right
    ctx.beginPath(); ctx.moveTo(sx + sw - cornerLen, sy + sh); ctx.lineTo(sx + sw, sy + sh); ctx.lineTo(sx + sw, sy + sh - cornerLen); ctx.stroke();

    // Label background
    const label = pred.class.toUpperCase() + ' ' + confidence + '%';
    ctx.font = 'bold 13px Inter, sans-serif';
    const textWidth = ctx.measureText(label).width;
    const labelPadding = 6;
    const labelHeight = 22;

    ctx.fillStyle = color;
    ctx.fillRect(sx, sy - labelHeight - 2, textWidth + labelPadding * 2, labelHeight);

    // Label text
    ctx.fillStyle = '#ffffff';
    ctx.fillText(label, sx + labelPadding, sy - 8);

    // Pulsing glow effect for suspicious items
    ctx.shadowColor = color;
    ctx.shadowBlur = 15;
    ctx.strokeStyle = color;
    ctx.lineWidth = 1;
    ctx.strokeRect(sx - 2, sy - 2, sw + 4, sh + 4);
    ctx.shadowBlur = 0;
  });

  // Draw non-suspicious detections with lighter styling (optional context)
  allPredictions.forEach(pred => {
    if (SUSPICIOUS_OBJECTS.includes(pred.class)) return; // already drawn
    if (pred.score < 0.5) return; // skip low-confidence

    const [x, y, width, height] = pred.bbox;
    const sx = x * scaleX;
    const sy = y * scaleY;
    const sw = width * scaleX;
    const sh = height * scaleY;

    // Light dashed box for context objects
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    ctx.strokeRect(sx, sy, sw, sh);
    ctx.setLineDash([]);

    // Small label
    const label = pred.class + ' ' + Math.round(pred.score * 100) + '%';
    ctx.font = '10px Inter, sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText(label, sx + 4, sy + sh - 4);
  });
}

function handleSuspiciousDetection(suspicious) {
  const cameraContainer = document.getElementById('cameraScreen');
  const banner = document.getElementById('detectionBanner');
  const bannerText = document.getElementById('detectionBannerText');
  const statusEl = document.getElementById('detectionStatus');

  // Flash camera border
  cameraContainer.classList.add('alert-flash');
  setTimeout(() => cameraContainer.classList.remove('alert-flash'), 800);

  // Show detection banner
  const objectNames = [...new Set(suspicious.map(s => s.class))];
  const topConfidence = Math.round(Math.max(...suspicious.map(s => s.score)) * 100);
  bannerText.textContent = objectNames.join(', ').toUpperCase() + ' DETECTED (' + topConfidence + '%)';
  banner.classList.add('visible');

  // Update AI status to alert mode
  statusEl.classList.add('alert-mode');
  document.getElementById('detectionStatusText').textContent = '⚠ ' + suspicious.length + ' object(s)';

  // Send detection alert to PC (with cooldown per object type)
  suspicious.forEach(pred => {
    const objClass = pred.class;
    const now = Date.now();
    const lastAlert = detectionAlertCooldowns[objClass] || 0;

    // 30 second cooldown per object type
    if (now - lastAlert > 30000) {
      detectionAlertCooldowns[objClass] = now;

      if (conn && conn.open) {
        conn.send(JSON.stringify({
          type: 'object_detection',
          object: objClass,
          confidence: Math.round(pred.score * 100),
          bbox: pred.bbox,
          timestamp: now,
          allObjects: objectNames
        }));
        console.log('[ARGUS-SEC] 🚨 Sent detection alert:', objClass, Math.round(pred.score * 100) + '%');
      }
    }
  });
}

function clearDetectionAlert() {
  const banner = document.getElementById('detectionBanner');
  const statusEl = document.getElementById('detectionStatus');

  banner.classList.remove('visible');
  statusEl.classList.remove('alert-mode');
  document.getElementById('detectionStatusText').textContent = 'AI Scanning...';
}

function captureAndSend() {
  if (!conn || conn.open === false) return;

  const video = document.getElementById('cameraFeed');
  if (!video || video.videoWidth === 0) return;

  const canvas = document.getElementById('snapshotCanvas');
  canvas.width = 480;
  canvas.height = 360;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, 480, 360);

  const imageData = canvas.toDataURL('image/jpeg', 0.6);
  snapshotCount++;

  // Send to PC
  try {
    conn.send(JSON.stringify({
      type: 'snapshot',
      image: imageData,
      count: snapshotCount,
      timestamp: Date.now(),
      detectedObjects: lastDetectedObjects.map(o => ({
        class: o.class,
        confidence: Math.round(o.score * 100)
      }))
    }));
    console.log('[ARGUS-SEC] 📸 Snapshot #' + snapshotCount + ' sent');
  } catch (e) {
    console.warn('[ARGUS-SEC] Failed to send snapshot:', e.message);
  }

  // Update counter
  document.getElementById('snapshotCounter').textContent = 'Snapshots: ' + snapshotCount;
}

function stopMonitoring() {
  if (snapshotInterval) {
    clearInterval(snapshotInterval);
    snapshotInterval = null;
  }
  if (detectionLoop) {
    clearInterval(detectionLoop);
    detectionLoop = null;
    detectionActive = false;
  }
  if (cameraStream) {
    cameraStream.getTracks().forEach(t => t.stop());
  }
}

function updateStatus(text, state) {
  const pill = document.getElementById('statusPill');
  const statusText = document.getElementById('statusText');
  statusText.textContent = text;
  pill.className = 'status-pill' + (state ? ' ' + state : '');
}

function showError(message) {
  document.getElementById('connectScreen').style.display = 'flex';
  document.getElementById('cameraScreen').style.display = 'none';
  document.getElementById('connectError').style.display = 'block';
  document.getElementById('connectError').textContent = message;
  updateStatus('Error', 'error');
}

// Prevent phone from sleeping
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      console.log('[ARGUS-SEC] Wake lock acquired');
    }
  } catch (e) {
    console.warn('[ARGUS-SEC] Wake lock not available');
  }
}
requestWakeLock();

// Re-acquire wake lock on visibility change
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && !wakeLock) {
    requestWakeLock();
  }
});
</script>
